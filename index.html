<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>薪資差異分析 · 月對月</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>薪資差異分析</h1>
  <p class="sub">為什麼這個月人數少了，總額卻增加？一鍵看懂。</p>
</header>

<section class="panel" id="loadPanel">
  <div class="drop" id="drop">
    <input type="file" id="file" accept=".xlsx,.xls" hidden>
    <p>把 <b>薪资.xlsx</b> 拖進來，或 <button class="link" id="pick">點此選檔</button></p>
    <p class="hint">資料只在你的瀏覽器裡計算，不會上傳到任何伺服器。</p>
  </div>
  <div class="controls hidden" id="controls">
    <label>本月 <select id="curSheet"></select></label>
    <label>上月 <select id="prevSheet"></select></label>
    <label>本月匯率 <input type="number" step="0.0001" id="curRate"></label>
    <label>上月匯率 <input type="number" step="0.0001" id="prevRate"></label>
    <button id="run">開始分析</button>
  </div>
</section>

<main id="result" class="hidden">

  <!-- 兩個大數字 -->
  <div class="bigcards">
    <div class="bigcard">
      <div class="bk">人數</div>
      <div class="bv" id="cHead"></div>
      <div class="bd" id="cHeadD"></div>
    </div>
    <div class="bigcard">
      <div class="bk">總額（PHP 披索）</div>
      <div class="bv" id="cTotal"></div>
      <div class="bd" id="cTotalD"></div>
    </div>
  </div>

  <!-- 結論：條列 + 長條 -->
  <section class="conclude">
    <h2>📊 結論：總額為什麼變了</h2>
    <p class="lead" id="lead"></p>
    <ul class="drivers" id="drivers"></ul>
    <p class="foot" id="driverFoot"></p>
  </section>

  <!-- 部門變動最大 -->
  <h2>🏢 哪些部門變動最大</h2>
  <div class="deptbars" id="deptBars"></div>
  <details class="more">
    <summary>展開完整事業群／事業部明細表</summary>
    <table class="tbl" id="groupTbl"></table>
  </details>

  <!-- 完整瀑布（折疊） -->
  <details class="more">
    <summary>展開完整對帳瀑布（上月 → 本月，每段相加剛好對上）</summary>
    <div id="waterfall" class="waterfall"></div>
    <p class="note" id="bridgeNote"></p>
  </details>

  <!-- 名單 -->
  <h2>👥 人員異動名單</h2>
  <div class="rosters">
    <div>
      <h3 id="joinTitle">本月新進</h3>
      <table class="tbl small" id="joinTbl"></table>
    </div>
    <div>
      <h3 id="leaveTitle">本月離職／不享當月薪資</h3>
      <table class="tbl small" id="leaveTbl"></table>
    </div>
  </div>
</main>

<script src="app.js"></script>
</body>
</html>
